<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Dashboard LEC</title>
  <style>
    :root {
      --bg: #0b0b0d;
      --panel: #15151a;
      --border: #2a2a32;
      --text: #f6f4f0;
      --muted: #aeb4d4;
      --orange: #ff6b2b;
      --red: #ff4f4f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      padding: 24px;
    }
    .login-box {
      width: min(100%, 380px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }
    .logo {
      width: 64px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: var(--orange);
      color: #fff;
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: 22px;
    }
    h1 { font-size: 18px; margin: 0 0 6px; }
    p { color: var(--muted); margin: 0 0 22px; font-size: 14px; }
    label { display: block; color: var(--muted); font-size: 12px; font-weight: 700; margin: 16px 0 6px; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #1d1d24;
      color: var(--text);
      font-size: 15px;
      padding: 12px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: var(--orange);
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      padding: 12px;
      margin-top: 22px;
      cursor: pointer;
    }
    .error {
      border: 1px solid rgba(255,79,79,.45);
      background: rgba(255,79,79,.10);
      color: #ffd4d4;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <main class="login-box">
    <div class="logo">LEC</div>
    <h1>Dashboard LEC</h1>
    <p>Entre para acessar os dados de campanhas pagas.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="username">Usuário</label>
      <input id="username" name="username" autocomplete="username" required>
      <label for="password">Senha</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Entrar</button>
    </form>
  </main>
</body>
</html>
